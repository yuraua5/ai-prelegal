name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install deps
        working-directory: backend
        run: uv sync --extra dev
      # The backend serves the SPA from frontend/dist (step-11), so tests that
      # hit "/" expect the bundle to exist. Build it once before pytest so
      # CI exercises production behaviour rather than the missing-bundle fallback.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Build frontend bundle
        working-directory: frontend
        run: npm run build
      - name: Pytest
        working-directory: backend
        run: uv run pytest

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install
      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b
      - name: Vitest
        working-directory: frontend
        run: npm test