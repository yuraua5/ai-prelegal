# Local development compose for Prelegal.
#
# One service (app) on http://localhost:8000 that serves:
#   - FastAPI at /api/* (and /healthz)
#   - React SPA at / (added in step-11)
#
# Build context is the repo root so the multi-stage Dockerfile can see
# `frontend/` (built into `frontend/dist`) and `backend/app/`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prelegal:dev
    container_name: prelegal-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Empty by default; step-12 will fail fast if it remains empty when AI is enabled.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      # Mount templates/catalog live for fast iteration on text without a rebuild.
      # These paths are read-only inside the container.
      - ./templates:/app/templates:ro
      - ./catalog.json:/app/catalog.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s